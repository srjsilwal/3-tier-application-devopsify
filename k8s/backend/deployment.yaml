apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: jerney
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: BACKEND_IMAGE
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DB_HOST
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DB_NAME

            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                 name: postgres-secret
                 key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                 name: postgres-secret
                 key: DB_PASSWORD

          resource:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000

            initialDelaySeconds: 30
          readinessProbe:
            httpGet:
             path: /health
             port: 5000
            initialDelaySeconds: 20